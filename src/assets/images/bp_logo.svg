<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Elegant Interlocking Serif BP Monogram - Transparent & Centered -->
  <g transform="translate(-5, 10)">
    <!-- B character -->
    <text x="35" y="138" font-family="'Georgia', 'Times New Roman', 'Playfair Display', serif" font-weight="900" font-size="130" fill="#000000">B</text>
    <!-- P character, shifted right and slightly down, styled to interlock -->
    <text x="95" y="152" font-family="'Georgia', 'Times New Roman', 'Playfair Display', serif" font-weight="950" font-size="130" fill="#000000">P</text>
  </g>
</svg>
